# MySQL partagé (namespace skillio). Mot de passe root : à adapter ou surcharger via Secret externe.
# Déployé une seule fois (parameter DEPLOY_MYSQL=true sur un job CD).
apiVersion: v1
kind: Namespace
metadata:
  name: skillio
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: skillio
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: skillio-demo-change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: skillio
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 45
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: skillio
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
