# Skillio — Spring Boot: add the following lines to each microservice’s
# src/main/resources/application.properties (merge with existing management.* keys; do not duplicate keys).
#
# Microservices: User, Training, Entreprise, Event, subscription
# Paths: Backend/Backend/microservices/<name>/src/main/resources/application.properties
#
# -----------------------------------------------------------------------------

management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
