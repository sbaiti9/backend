# CORS côté client : CorsConfig.java (CorsWebFilter).
# Les microservices peuvent renvoyer leurs propres Access-Control-* ; on les retire sur la réponse proxy pour éviter le doublon avec le filtre CORS de la gateway.
spring:
  cloud:
    gateway:
      default-filters:
        - RemoveResponseHeader=Access-Control-Allow-Origin
        - RemoveResponseHeader=Access-Control-Allow-Credentials
        - RemoveResponseHeader=Access-Control-Expose-Headers
        - RemoveResponseHeader=Access-Control-Allow-Headers
        - RemoveResponseHeader=Access-Control-Max-Age
        - "DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Headers Access-Control-Expose-Headers Access-Control-Max-Age"
