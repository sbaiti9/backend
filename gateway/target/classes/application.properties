spring.application.name=gateway
server.port=8091

# Si tu obtiens 503 sur /entreprise/** : le microservice Entreprise n'est pas enregistré sur Eureka.
# Option A — démarrer Eureka (8762) puis Entreprise (8083 par défaut), puis cette gateway.
# Option B — contourner Eureka en pointant directement vers Entreprise (décommenter la ligne suivante) :
gateway.services.entreprise-direct-uri=http://127.0.0.1:8083

# Si tu obtiens 503 sur /sub/**, /api/liveness/** ou /api/unlock-chat/** : subscription non résolu via Eureka.
# Option A — Eureka + subscription enregistré ; Option B — URL directe (port par défaut du microservice subscription) :
gateway.services.subscription-direct-uri=http://127.0.0.1:8089

# 503 sur /user/** (register, login) : microservice User non résolu via Eureka. URL directe (port par défaut = 8085, spring.application.name=user) :
gateway.services.user-direct-uri=http://127.0.0.1:8085

#EUREKA_Registery
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8762/eureka
# Long-lived SSE streams (unlock-chat admin/user) — default client timeouts can cut event-stream mid-flight
# connect-timeout is in milliseconds (integer), not Duration strings
spring.cloud.gateway.httpclient.connect-timeout=30000
# response-timeout accepts Duration (e.g. 2h)
spring.cloud.gateway.httpclient.response-timeout=2h
#Log routes
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
