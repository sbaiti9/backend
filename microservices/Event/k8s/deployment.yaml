apiVersion: apps/v1
kind: Deployment
metadata:
  name: event
  namespace: skillio
  labels:
    app: event
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event
  template:
    metadata:
      labels:
        app: event
    spec:
      containers:
        - name: event
          image: wissemsbaiti/skillio-event:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8099
          env:
            - name: SERVER_PORT
              value: "8099"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql.skillio.svc.cluster.local:3306/entreprise_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
