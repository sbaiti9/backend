apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: event-metrics
  namespace: skillio
  labels:
    app: event
spec:
  selector:
    matchLabels:
      app: event
  namespaceSelector:
    matchNames:
      - skillio
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
