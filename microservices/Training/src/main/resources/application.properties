spring.application.name=Training
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8762/eureka
server.port=8086
# Database Configuration (MySQL) - aligned with other microservices
spring.datasource.url=jdbc:mysql://localhost:3306/entreprise_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging (optional - to see SQL queries)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Anthropic (Claude) — set env ANTHROPIC_API_KEY (recommended)
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Groq (optional AI) — set env GROQ_API_KEY (do not hardcode secrets here)
groq.api.key=${GROQ_API_KEY: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}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
# Vision / multimodal (llama-3.2-90b-vision-preview was decommissioned — see https://console.groq.com/docs/vision )
groq.vision.model=meta-llama/llama-4-scout-17b-16e-instruct

# Proctor (quiz iframe): session TTL 2h, min 4s between vision calls
app.proctor.session-ttl-ms=7200000
app.proctor.min-interval-ms=4000
app.proctor.max-analyzes-per-session=80

# Local uploads for training content files
app.upload.contents-dir=uploads/contents

# File upload limits (allow videos/images/etc)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
# Avoid connection resets on large uploads in embedded Tomcat
server.tomcat.max-swallow-size=-1

# Initialize SQL on startup (creates legacy tables if needed)
spring.sql.init.mode=always
spring.sql.init.platform=mysql

# Firebase Admin SDK (optional)
firebase.credentials.path=

# Actuator / Prometheus (scraping kube-prometheus-stack)
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=when_authorized