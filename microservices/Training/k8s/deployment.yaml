apiVersion: apps/v1
kind: Deployment
metadata:
  name: training
  namespace: skillio
  labels:
    app: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: training
  template:
    metadata:
      labels:
        app: training
    spec:
      containers:
        - name: training
          image: wissemsbaiti/skillio-training:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          env:
            - name: SERVER_PORT
              value: "8086"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql.skillio.svc.cluster.local:3306/entreprise_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
