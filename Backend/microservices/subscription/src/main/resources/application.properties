# User service internal geo API (must match user microservice)
skillio.internal.api-key=SkillioInternalGeo2026Key

# HS256 liveness payment token (min 32 chars)
liveness.jwt.secret=SkillioLivenessJwtSecretKey2026MustBe32CharsMin!

# Anti-spam: max challenge creations per user per rolling window (default in code was 3/10min — too strict for QA)
liveness.challenge.window-minutes=10
liveness.challenge.max-per-window=40

# Admin API for liveness user blocks (header X-Liveness-Admin-Secret)
liveness.admin.secret=SkillioLivenessAdmin2026SecretKey!

# Email optionnel pour NEEDS_HUMAN_REVIEW — le jeton est surtout dans la cloche / SSE (désactivé par défaut).
liveness.admin.email=admin@skillio.com
liveness.admin.email.human-review.enabled=false
liveness.admin.notification.enabled=true

# Groq — même clé / URL / modèle pour unlock-chat ET conseiller de plans (PlanAdvisorAiService → GroqChatClient).
# Set OS env GROQ_API_KEY=gsk_... (recommended). Do not use ${gsk_...} here — that is invalid Spring syntax.
groq.api.enabled=true
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY:}
groq.api.model=llama-3.1-8b-instant

# Unlock-chat IA : nombre minimum de messages UTILISATEUR avant escalade NEEDS_HUMAN_REVIEW + notification admin (10 = trop strict pour petits échanges).
skillio.unlock-chat.ai.escalate-min-user-messages=3
# Températures Groq (plus élevé = scores moins « collés » à 80 %).
skillio.unlock-chat.groq.temperature=0.42
skillio.unlock-chat.groq.forced-temperature=0.78
# Conseiller de plans (/sub/recommendations/plan?userId=...) — même API Groq ci-dessus.
skillio.plan-advisor.groq.temperature=0.35

# Tutor salary recommendation engine (deterministic + Groq explainer)
skillio.tutor-salary.base-monthly=1200
skillio.tutor-salary.min-monthly=700
skillio.tutor-salary.max-monthly=6000
skillio.tutor-salary.weight-performance=0.50
skillio.tutor-salary.weight-reliability=0.30
skillio.tutor-salary.weight-workload=0.20
skillio.tutor-salary.groq.temperature=0.25
# Redis Cache
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.cache.type=redis

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
