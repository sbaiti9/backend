spring.application.name=subscription
server.port=8089

app.frontend.url=http://localhost:4200

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/entreprise_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Only expose @RepositoryRestResource beans (explicit). Prevents Spring Data REST from hijacking paths like
# /api/unlock-chat/session/{id} with auto-exported UnlockChatSessionRepository — which caused 404 on MVC routes.
spring.data.rest.detection-strategy=annotated

# Fixes MySQL error: Field 'id' doesn't have a default value (subscriptions.id must be AUTO_INCREMENT)
skillio.db.auto-fix-subscriptions-id=true
# Adds auto_renew if missing (older DBs without this column break Hibernate SELECTs)
skillio.db.auto-fix-subscriptions-auto-renew=true
# Relax session_id NOT NULL on older admin_notifications (USER_BLOCKED, debug UI test)
skillio.db.auto-fix-admin-notifications-session-id-nullable=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://eureka.skillio.svc.cluster.local:8761/eureka/
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

