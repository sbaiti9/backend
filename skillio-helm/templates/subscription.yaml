apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription
  namespace: skillio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscription
  template:
    metadata:
      labels:
        app: subscription
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: subscription
          image: {{ .Values.subscription.image }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: subscription
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: subscription
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30084
