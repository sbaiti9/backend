apiVersion: v1
kind: Service
metadata:
  name: event
  namespace: {{ .Values.namespace }}
  labels:
    app: event
spec:
  type: NodePort
  selector:
    app: event
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.event.containerPort }}
      nodePort: {{ .Values.nodePorts.event }}
