apiVersion: apps/v1
kind: Deployment
metadata:
  name: event
  namespace: {{ .Values.namespace }}
  labels:
    app: event
spec:
  replicas: {{ .Values.replicas.event }}
  selector:
    matchLabels:
      app: event
  template:
    metadata:
      labels:
        app: event
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: event
          image: "{{ .Values.images.event.repository }}:{{ .Values.images.event.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.event.containerPort }}
          env:
            - name: SERVER_PORT
              value: "{{ .Values.event.containerPort }}"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.event.databaseUrl | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
