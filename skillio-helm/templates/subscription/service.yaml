apiVersion: v1
kind: Service
metadata:
  name: subscription
  namespace: {{ .Values.namespace }}
  labels:
    app: subscription
spec:
  type: NodePort
  selector:
    app: subscription
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.subscription.containerPort }}
      nodePort: {{ .Values.nodePorts.subscription }}
