apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: skillio
data:
  application.yml: |
    server:
      port: 8091
    eureka:
      client:
        register-with-eureka: false
        fetch-registry: false
    spring:
      cloud:
        gateway:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://192.168.33.10:30095"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: user
              uri: http://user.skillio.svc.cluster.local:8080
              predicates:
                - Path=/user/**
            - id: entreprise
              uri: http://entreprise.skillio.svc.cluster.local:8080
              predicates:
                - Path=/entreprise/**
            - id: subscription
              uri: http://subscription.skillio.svc.cluster.local:8080
              predicates:
                - Path=/sub/**
            - id: event
              uri: http://event.skillio.svc.cluster.local:8080
              predicates:
                - Path=/event/**
            - id: training
              uri: http://training.skillio.svc.cluster.local:8080
              predicates:
                - Path=/training/**
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: skillio
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: api-gateway
          image: {{ .Values.apiGateway.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          volumeMounts:
            - name: config
              mountPath: /config
          env:
            - name: SPRING_CONFIG_ADDITIONAL-LOCATION
              value: "file:/config/application.yml"
      volumes:
        - name: config
          configMap:
            name: api-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30091
