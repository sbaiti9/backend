apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: skillio
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: api-gateway
          image: {{ .Values.apiGateway.image }}
          ports:
            - containerPort: 8091
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30091
