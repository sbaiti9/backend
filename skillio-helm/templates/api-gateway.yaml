apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: skillio
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: api-gateway
          image: {{ .Values.apiGateway.image }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          env:
            # Disable Eureka
            - name: EUREKA_CLIENT_REGISTER-WITH-EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH-REGISTRY
              value: "false"

            # CORS
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDORIGINS_0
              value: "http://192.168.33.10:30095"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDMETHODS_0
              value: "GET"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDMETHODS_1
              value: "POST"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDMETHODS_2
              value: "PUT"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDMETHODS_3
              value: "DELETE"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDMETHODS_4
              value: "OPTIONS"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWEDHEADERS_0
              value: "*"
            - name: SPRING_CLOUD_GATEWAY_GLOBALCORS_CORSCONFIGURATIONS_[/**]_ALLOWCREDENTIALS
              value: "true"

            # Routes with StripPrefix
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_ID
              value: "user"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: "http://user:8080"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0
              value: "Path=/user/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0
              value: "StripPrefix=1"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_ID
              value: "entreprise"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: "http://entreprise:8080"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0
              value: "Path=/entreprise/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0
              value: "StripPrefix=1"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_ID
              value: "subscription"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: "http://subscription:8080"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0
              value: "Path=/sub/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0
              value: "StripPrefix=1"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_ID
              value: "event"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_URI
              value: "http://event:8080"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0
              value: "Path=/event/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_3_FILTERS_0
              value: "StripPrefix=1"

            - name: SPRING_CLOUD_GATEWAY_ROUTES_4_ID
              value: "training"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_4_URI
              value: "http://training:8080"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_4_PREDICATES_0
              value: "Path=/training/**"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_4_FILTERS_0
              value: "StripPrefix=1"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8091
      targetPort: 8091
      nodePort: 30091
