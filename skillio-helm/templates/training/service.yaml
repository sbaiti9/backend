apiVersion: v1
kind: Service
metadata:
  name: training
  namespace: {{ .Values.namespace }}
  labels:
    app: training
spec:
  type: NodePort
  selector:
    app: training
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.training.containerPort }}
      nodePort: {{ .Values.nodePorts.training }}
