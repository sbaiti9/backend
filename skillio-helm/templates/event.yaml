apiVersion: apps/v1
kind: Deployment
metadata:
  name: event
  namespace: skillio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event
  template:
    metadata:
      labels:
        app: event
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: event
          image: {{ .Values.event.image }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: event
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: event
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30083
