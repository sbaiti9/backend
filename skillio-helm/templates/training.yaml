apiVersion: apps/v1
kind: Deployment
metadata:
  name: training
  namespace: skillio
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: training
  template:
    metadata:
      labels:
        app: training
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: training
          image: {{ .Values.training.image }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: training
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: training
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
