apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: skillio
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: user
          image: {{ .Values.user.image }}
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/entreprise_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root123"
            - name: JAVA_TOOL_OPTIONS
              value: "-Deureka.client.enabled=false -Deureka.client.register-with-eureka=false -Deureka.client.fetch-registry=false -Dspring.cloud.discovery.enabled=false"
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: user
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081
