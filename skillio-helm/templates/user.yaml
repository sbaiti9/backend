apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: skillio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: user
          image: {{ .Values.user.image }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: user
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
