apiVersion: apps/v1
kind: Deployment
metadata:
  name: entreprise
  namespace: skillio
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: entreprise
  template:
    metadata:
      labels:
        app: entreprise
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: entreprise
          image: {{ .Values.entreprise.image }}
          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/entreprise_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "root123"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://localhost:8762/eureka/"
---
apiVersion: v1
kind: Service
metadata:
  name: entreprise
  namespace: skillio
spec:
  type: NodePort
  selector:
    app: entreprise
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30082
