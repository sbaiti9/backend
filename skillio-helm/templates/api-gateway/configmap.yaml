apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-conf
  namespace: {{ .Values.namespace }}
  labels:
    app: api-gateway
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        location /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "{{ .Values.apiGateway.cors.origin }}";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-Liveness-Admin-Secret, x-liveness-admin-secret, X-Liveness-Token, x-liveness-token, X-Auth-Token, x-auth-token, Origin, Access-Control-Request-Method, Access-Control-Request-Headers";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age "3600";
                add_header Content-Length 0;
                return 204;
            }

            proxy_pass http://127.0.0.1:8091;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 7200s;
            proxy_send_timeout 7200s;

            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin "{{ .Values.apiGateway.cors.origin }}" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Expose-Headers "X-Liveness-Token, Authorization, X-Skillio-Auth-Hint" always;
        }
    }
