apiVersion: v1
kind: Service
metadata:
  name: entreprise
  namespace: {{ .Values.namespace }}
  labels:
    app: entreprise
spec:
  type: NodePort
  selector:
    app: entreprise
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.entreprise.containerPort }}
      nodePort: {{ .Values.nodePorts.entreprise }}
